services:
  postgres:
    image: postgres:16-alpine
    container_name: insureflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insureflow}
      POSTGRES_USER: ${POSTGRES_USER:-insureflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insureflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insureflow} -d ${POSTGRES_DB:-insureflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: insureflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-insureflow}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-insureflow}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  triage-service:
    profiles: ["app"]
    build:
      context: ./ai-services/triage-service
      dockerfile: Dockerfile
    image: insureflow-triage:${INSUREFLOW_IMAGE_TAG:-local}
    container_name: insureflow-triage-service
    ports:
      - "${TRIAGE_SERVICE_PORT:-8001}:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  document-intelligence-service:
    profiles: ["app"]
    build:
      context: ./ai-services/document-intelligence-service
      dockerfile: Dockerfile
    image: insureflow-document-intelligence:${INSUREFLOW_IMAGE_TAG:-local}
    container_name: insureflow-document-intelligence-service
    ports:
      - "${DOCUMENT_INTELLIGENCE_SERVICE_PORT:-8002}:8002"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  rag-service:
    profiles: ["app"]
    build:
      context: ./ai-services/rag-service
      dockerfile: Dockerfile
    image: insureflow-rag:${INSUREFLOW_IMAGE_TAG:-local}
    container_name: insureflow-rag-service
    ports:
      - "${RAG_SERVICE_PORT:-8003}:8003"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8003/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    image: insureflow-api:${INSUREFLOW_IMAGE_TAG:-local}
    container_name: insureflow-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-insureflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-insureflow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-insureflow}
      INSUREFLOW_JWT_ISSUER: ${INSUREFLOW_JWT_ISSUER:-insureflow-ai}
      INSUREFLOW_JWT_SECRET: ${INSUREFLOW_JWT_SECRET:-local-development-secret-for-insureflow-phase-12}
      INSUREFLOW_AI_TRIAGE_BASE_URL: http://triage-service:8001
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      triage-service:
        condition: service_started

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: insureflow-frontend:${INSUREFLOW_IMAGE_TAG:-local}
    container_name: insureflow-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.55.1
    container_name: insureflow-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_started

  grafana:
    profiles: ["observability"]
    image: grafana/grafana-oss:11.3.1
    container_name: insureflow-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-insureflow}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
