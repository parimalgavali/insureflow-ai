spring:
  application:
    name: insureflow-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/insureflow}
    username: ${SPRING_DATASOURCE_USERNAME:insureflow}
    password: ${SPRING_DATASOURCE_PASSWORD:insureflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

insureflow:
  security:
    jwt:
      issuer: ${INSUREFLOW_JWT_ISSUER:insureflow-ai}
      secret: ${INSUREFLOW_JWT_SECRET:local-development-secret-for-insureflow-phase-11}
      expires-in-minutes: ${INSUREFLOW_JWT_EXPIRES_IN_MINUTES:120}
  ai:
    triage:
      base-url: ${INSUREFLOW_AI_TRIAGE_BASE_URL:http://localhost:8001}
